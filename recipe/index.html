<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Recipe — The Recipe Box</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet">
<link rel="stylesheet" href="../assets/style.css">
</head>
<body>

<header class="site-header">
  <div class="inner">
    <h1 class="brand"><a href="../index.html">The Recipe Box</a></h1>
  </div>
</header>

<main class="wrap">
  <a class="back-link" href="../index.html">‹ Back to the box</a>
  <div id="content"></div>
</main>

<script src="../assets/recipes-data.js"></script>
<script src="../assets/app.js"></script>
<script>
  const params = new URLSearchParams(window.location.search);
  const id = params.get("id");
  const recipe = RECIPES.find(r => r.id === id);
  const contentEl = document.getElementById("content");

  if (!recipe) {
    contentEl.innerHTML = `<div class="empty-state">Couldn't find that recipe. <a href="../index.html">Back to the box</a></div>`;
  } else {
    document.title = `${recipe.title} — The Recipe Box`;
    let servings = recipe.servingsBase;

    function render() {
      const scale = servings / recipe.servingsBase;
      contentEl.innerHTML = `
        <div class="recipe-card">
          <span class="pill"><span class="dot" style="background:${categoryColor(recipe.category)}"></span>${recipe.category}</span>
          <div class="recipe-head">
            <h1>${recipe.title}</h1>
            <p class="tagline">${recipe.tagline}</p>
          </div>

          <div class="stat-row">
            <div class="stat">
              <span class="label">Time</span>
              <span class="value">${recipe.time}</span>
            </div>
            <div class="stat">
              <span class="label">Difficulty</span>
              <span class="value">${recipe.difficulty}</span>
            </div>
            <div class="stat">
              <span class="label">Servings</span>
              <span class="value">
                <span class="servings-stepper">
                  <button id="dec" aria-label="Decrease servings">−</button>
                  <span id="servingsVal">${servings}</span>
                  <button id="inc" aria-label="Increase servings">+</button>
                </span>
              </span>
            </div>
          </div>

          <div class="recipe-body">
            <div>
              <h2 class="col-title">Ingredients</h2>
              <ul class="ingredient-list">
                ${recipe.ingredients.map(ing => `
                  <li>
                    <span class="amt">${formatAmount(ing.amount * scale)}${ing.unit ? " " + ing.unit : ""}</span>
                    <span>${ing.name}</span>
                  </li>
                `).join("")}
              </ul>
            </div>
            <div>
              <h2 class="col-title">Method</h2>
              <ol class="step-list">
                ${recipe.steps.map(step => `<li>${step}</li>`).join("")}
              </ol>
            </div>
          </div>

          ${recipe.notes ? `<p class="notes">${recipe.notes}</p>` : ""}
        </div>
      `;

      document.getElementById("dec").addEventListener("click", () => {
        if (servings > 1) { servings--; render(); }
      });
      document.getElementById("inc").addEventListener("click", () => {
        servings++; render();
      });
    }

    render();
  }
</script>

</body>
</html>
