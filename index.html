<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>The Recipe Box</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet">
<link rel="stylesheet" href="assets/style.css">
</head>
<body>

<header class="site-header">
  <div class="inner">
    <h1 class="brand">The Recipe Box</h1>
    <input type="search" id="search" class="search-input" placeholder="Search recipes or ingredients…" aria-label="Search recipes">
  </div>
</header>

<main class="wrap">
  <div class="filters" id="filters"></div>
  <div class="card-grid" id="grid"></div>
  <div class="empty-state" id="empty" style="display:none">No recipes match.</div>
</main>

<script src="assets/recipes-data.js"></script>
<script src="assets/app.js"></script>
<script>
  const grid = document.getElementById("grid");
  const filtersEl = document.getElementById("filters");
  const emptyEl = document.getElementById("empty");
  const searchEl = document.getElementById("search");
  let activeFilter = "All";
  let query = "";

  function renderFilters() {
    const categories = ["All", ...new Set(RECIPES.map(r => r.category))];
    filtersEl.innerHTML = categories.map(cat => {
      const dot = cat === "All"
        ? ""
        : `<span class="dot" style="background:${categoryColor(cat)}"></span>`;
      return `<button class="filter-btn${cat === activeFilter ? " active" : ""}" data-cat="${cat}">${dot}${cat}</button>`;
    }).join("");

    filtersEl.querySelectorAll(".filter-btn").forEach(btn => {
      btn.addEventListener("click", () => {
        activeFilter = btn.dataset.cat;
        renderFilters();
        renderGrid();
      });
    });
  }

  function renderGrid() {
    const q = query.trim().toLowerCase();
    const list = RECIPES
      .filter(r => activeFilter === "All" || r.category === activeFilter)
      .filter(r => !q
        || r.title.toLowerCase().includes(q)
        || r.tagline.toLowerCase().includes(q)
        || r.ingredients.some(ing => ing.name.toLowerCase().includes(q)))
      .sort((a, b) => a.number - b.number);

    emptyEl.style.display = list.length ? "none" : "block";

    grid.innerHTML = list.map(r => `
      <a class="rcard" href="recipe/index.html?id=${encodeURIComponent(r.id)}">
        <span class="pill"><span class="dot" style="background:${categoryColor(r.category)}"></span>${r.category}</span>
        <h3>${r.title}</h3>
        <p class="tagline">${r.tagline}</p>
        <div class="meta-row">
          <span>${r.time}</span>
          <span>${r.difficulty}</span>
          <span>Serves ${r.servingsBase}</span>
        </div>
      </a>
    `).join("");
  }

  searchEl.addEventListener("input", () => {
    query = searchEl.value;
    renderGrid();
  });

  renderFilters();
  renderGrid();
</script>

</body>
</html>
